<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gayda Dergi</title>

    <link rel="stylesheet" href="styles.css">
    
    <script>
      // Kullanıcı gayda.gay üzerinden yönlendirilerek geldiyse veya direkt o domaindeyse
      if (document.referrer.includes('gayda.gay') || window.location.hostname.includes('gayda.gay')) {
        document.documentElement.classList.add('pride');
        // Tarayıcı hafızasına kaydet (Sayfa yenilense veya değişse de renkli kalması için)
        sessionStorage.setItem('prideMode', 'true');
      }

      // Eğer tarayıcı hafızasında prideMode aktifse temayı koru
      if (sessionStorage.getItem('prideMode') === 'true') {
        document.documentElement.classList.add('pride');
      }
    </script>
</head>
<body>

<div class="pride-line"></div>

<div class="container">
    <h1>GAYDA</h1>

    <div class="issue-selection">
        <label for="issueSelector">Sayı Seç:</label>
        <select id="issueSelector"></select>
    </div>

    <div id="magazine" class="viewer">
        <img id="page" alt="Dergi Sayfası">
    </div>

    <div class="zoom-controls">
        <button id="zoomOut">−</button>
        <span id="zoomLevel">100%</span>
        <button id="zoomIn">+</button>
    </div>

    <div class="navigation">
        <button id="prev">Önceki Sayfa</button>
        <span id="pageNumber"></span>
        <button id="next">Sonraki Sayfa</button>
    </div>

    <div class="extra-navigation">
        <button id="specialButton" style="display: none;"></button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
