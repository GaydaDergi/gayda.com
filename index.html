<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gayda Dergi</title>

    <link rel="stylesheet" href="styles.css">
    
<script>
      // URL parametrelerini kontrol et (?tema=pride var mı)
      const urlParams = new URLSearchParams(window.location.search);
      
      if (urlParams.get('tema') === 'pride' || sessionStorage.getItem('prideMode') === 'true') {
        document.documentElement.classList.add('pride');
        // Sayfa geçişlerinde veya yenilemelerde temanın kaybolmaması için hafızaya al
        sessionStorage.setItem('prideMode', 'true');
      }
    </script>
</head>
<body>

<div class="pride-line"></div>

<div class="container">
    <h1>GAYDA</h1>

    <div class="issue-selection">
        <label for="issueSelector">Sayı Seç:</label>
        <select id="issueSelector"></select>
    </div>

    <div id="magazine" class="viewer">
        <img id="page" alt="Dergi Sayfası">
    </div>

    <div class="zoom-controls">
        <button id="zoomOut">−</button>
        <span id="zoomLevel">100%</span>
        <button id="zoomIn">+</button>
    </div>

    <div class="navigation">
        <button id="prev">Önceki Sayfa</button>
        <span id="pageNumber"></span>
        <button id="next">Sonraki Sayfa</button>
    </div>

    <div class="extra-navigation">
        <button id="specialButton" style="display: none;"></button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
